<html>
<head>
    <title>Dynamic fonts for links</title>
    <style type="text/css">
        .regText {
            font: Times;
            font-size: 16pt;
        }
    </style>
</head>
<body>
    <p class="regText">Mouseover on below paragraph</p>
    <p style="color: blue;" 
       onmouseover="this.style.color = 'red'; this.style.font = 'italic 16pt Times';"
       onmouseout="this.style.color = 'blue'; this.style.font = 'normal 16pt Times';">
        This is working great !
    </p>
    <p class="regText">Simple demonstration on font change.</p>
</body>
</html>
